<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三句箴言 ‧ Three Mantras</title>
<style>
  :root{
    --paper:#f6f3ee;
    --paper-deep:#efeae1;
    --ink:#4a4238;
    --ink-soft:#7a7268;
    --gold:#b8a06a;
    --line:#ddd5c6;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    background:var(--paper);
    color:var(--ink);
  }

  body{
    font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
    line-height:2;
    -webkit-font-smoothing:antialiased;
  }

  .veil{
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,255,255,0.55), transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 100%, rgba(184,160,106,0.08), transparent 60%);
    z-index:0;
  }

  .page{
    position:relative;
    z-index:1;
    max-width:680px;
    margin:0 auto;
    padding:9vh 8vw 14vh;
  }

  .eyebrow{
    text-align:center;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.72rem;
    letter-spacing:0.32em;
    color:var(--ink-soft);
    text-transform:uppercase;
    margin-bottom:1.1rem;
  }

  .eyebrow .zh-name{
    display:block;
    font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
    text-transform:none;
    letter-spacing:0.28em;
    font-size:0.8rem;
    color:var(--gold);
  }

  h1{
    text-align:center;
    font-weight:500;
    font-size:clamp(1.6rem, 4vw, 2.15rem);
    letter-spacing:0.06em;
    margin:0 0 0.5rem;
    color:var(--ink);
  }

  h1 .sub{
    display:block;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.95rem;
    font-weight:300;
    letter-spacing:0.18em;
    color:var(--ink-soft);
    margin-top:0.3rem;
  }

  /* language toggle */
  .toggle-row{
    display:flex;
    justify-content:center;
    gap:0.6rem;
    margin-bottom:3rem;
    font-family:"Helvetica Neue",Arial,sans-serif;
  }
  .toggle-btn{
    border:1px solid var(--line);
    background:transparent;
    color:var(--ink-soft);
    font-size:0.72rem;
    letter-spacing:0.16em;
    padding:0.5rem 1.1rem;
    border-radius:999px;
    cursor:pointer;
    transition:all 0.25s ease;
  }
  .toggle-btn.active{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }

  .pull .zh-p{
    font-size:1.15rem;
    line-height:2.05;
    color:var(--ink);
    margin:0 0 1.1rem;
    text-align:center;
  }
  .pull{
    margin:3.4rem 0;
    padding:2.6rem 2rem;
    background:var(--paper-deep);
    border-left:2px solid var(--gold);
  }
  .pull .en{
    padding-top:1rem;
    border-top:1px dashed var(--line);
    text-align:center;
  }

  .en{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.92rem;
    font-style:italic;
    font-weight:300;
    color:var(--ink-soft);
    line-height:1.85;
    letter-spacing:0.005em;
    margin:0;
  }

  .source{
    margin-top:5rem;
    text-align:center;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.78rem;
    letter-spacing:0.14em;
    color:var(--ink-soft);
  }
  .source .loc{
    display:block;
    margin-top:0.4rem;
  }

  .quote-nav{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:start;
    gap:1rem;
    margin-top:4rem;
    padding-top:1.8rem;
    border-top:1px solid var(--line);
  }
  .quote-nav a{
    text-decoration:none;
    color:var(--ink-soft);
    font-size:0.85rem;
    letter-spacing:0.02em;
    transition:color 0.2s ease;
  }
  .quote-nav a:hover{
    color:var(--ink);
  }
  .quote-nav .dir{
    display:block;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.66rem;
    letter-spacing:0.12em;
    color:var(--gold);
    margin-bottom:0.4rem;
  }
  .quote-nav .nav-prev{
    text-align:left;
  }
  .quote-nav .nav-next{
    text-align:right;
  }
  .quote-nav .nav-home{
    align-self:center;
    text-align:center;
    white-space:nowrap;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.72rem;
    letter-spacing:0.1em;
    color:var(--gold);
    opacity:0.85;
  }
  .quote-nav .nav-home:hover{
    opacity:1;
  }

  body.mode-zh .en{ display:none; }

  body.mode-en .pull .zh-p{ display:none; }

  /* ===== share button ===== */
  .share-btn{
    position:fixed;
    right:1.4rem;
    bottom:1.4rem;
    width:2.7rem;
    height:2.7rem;
    border-radius:50%;
    background:var(--paper-deep);
    border:1px solid var(--line);
    color:var(--gold);
    font-size:1.05rem;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow:0 4px 16px rgba(58,53,46,0.14);
    transition:transform 0.2s ease, box-shadow 0.2s ease;
    z-index:20;
  }
  .share-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 22px rgba(58,53,46,0.18);
  }
  .share-toast{
    position:fixed;
    right:1.4rem;
    bottom:4.6rem;
    background:var(--ink);
    color:var(--paper);
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.72rem;
    letter-spacing:0.05em;
    padding:0.5rem 1rem;
    border-radius:999px;
    opacity:0;
    transform:translateY(6px);
    transition:opacity 0.25s ease, transform 0.25s ease;
    pointer-events:none;
    z-index:20;
    white-space:nowrap;
  }
  .share-toast.show{
    opacity:0.95;
    transform:translateY(0);
  }

  @media (max-width:480px){
    .page{ padding:8vh 7vw 10vh; }
    .pull{ padding:2rem 1.4rem; }
  }
</style>
</head>
<body class="mode-zh" data-quote-id="19851231_Three Mantras">
<div class="veil"></div>

<button class="share-btn" id="share-btn" aria-label="分享這篇語錄" title="分享">⤴</button>
<div class="share-toast" id="share-toast">連結已複製</div>

<div class="page">

  <div class="eyebrow">
    <span class="zh-name">錫呂‧瑪塔吉‧涅瑪拉‧德維　靈性語錄</span>
  </div>
  <h1>三句箴言
    <span class="sub">Three Mantras</span>
  </h1>

  <div class="toggle-row">
    <button class="toggle-btn" data-mode="zh">中文</button>
    <button class="toggle-btn" data-mode="both">中英對照</button>
    <button class="toggle-btn" data-mode="en">英文</button>
  </div>

  <div class="pull">
    <p class="zh-p">在情緒上，你應該洋溢著喜悅——喜悅，就是你的情緒。在行動上，你應該保持無念；在提升的過程中，你應該保持臣服。</p>
    <p class="en">In emotions you should be bubbling with joy. Joy is your emotion. In action you should be thoughtless and in ascent you should be surrendered.</p>
  </div>

  <div class="source">
    1985年12月31日‧印度 India
    <span class="loc">霎哈嘉瑜伽在全世界各國推廣皆為公益免費</span>
  </div>

  <nav class="quote-nav" id="quote-nav"></nav>

</div>

<script src="quotes-data.js"></script>
<script>
  (function(){
    var pageId = document.body.getAttribute('data-quote-id');
    var all = (typeof QUOTES_DATA !== 'undefined' ? QUOTES_DATA : []);
    // 顯示順序跟首頁一致：陣列最後一筆＝首頁第一張，
    // 所以把陣列反轉後，「上一篇」是反轉陣列中的前一項，
    // 「下一篇」是反轉陣列中的後一項。
    var ordered = all.slice().reverse();
    var idx = ordered.findIndex(function(q){ return q.id === pageId; });
    if (idx === -1) return;

    var prevItem = idx > 0 ? ordered[idx - 1] : null;
    var nextItem = idx < ordered.length - 1 ? ordered[idx + 1] : null;

    var navEl = document.getElementById('quote-nav');
    if (!navEl) return;

    var html = '';
    if (prevItem) {
      html += '<a class="nav-prev" href="' + prevItem.file + '"><span class="dir">\u2039 \u4e0a\u4e00\u7bc7</span>' + prevItem.zhTitle + '</a>';
    } else {
      html += '<span></span>';
    }
    html += '<a class="nav-home" href="index.html">\u56de\u9996\u9801</a>';
    if (nextItem) {
      html += '<a class="nav-next" href="' + nextItem.file + '"><span class="dir">\u4e0b\u4e00\u7bc7 \u203a</span>' + nextItem.zhTitle + '</a>';
    } else {
      html += '<span></span>';
    }
    navEl.innerHTML = html;
  })();
</script>
<script>
  const buttons = document.querySelectorAll('.toggle-btn');
  const body = document.body;

  function setMode(mode){
    body.className = 'mode-' + mode;
    buttons.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  }

  buttons.forEach(btn => {
    btn.addEventListener('click', () => setMode(btn.dataset.mode));
  });

  setMode('zh');
</script>

<script>
  (function(){
    var shareBtn = document.getElementById('share-btn');
    var toast = document.getElementById('share-toast');
    if (!shareBtn) return;

    var toastTimer = null;
    function showToast(msg){
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function(){
        toast.classList.remove('show');
      }, 2000);
    }

    shareBtn.addEventListener('click', async function(){
      var h1 = document.querySelector('h1');
      var zhTitle = h1 ? h1.childNodes[0].textContent.trim() : document.title;
      var shareData = {
        title: zhTitle + ' ‧ 錫呂瑪塔吉靈性語錄',
        url: window.location.href
      };

      if (navigator.share) {
        try {
          await navigator.share(shareData);
        } catch (e) {
          // 使用者取消分享，不用特別處理
        }
        return;
      }

      try {
        await navigator.clipboard.writeText(window.location.href);
        showToast('連結已複製');
      } catch (e) {
        window.prompt('複製這個連結來分享：', window.location.href);
      }
    });
  })();
</script>
</body>
</html>
