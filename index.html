<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>靈性語錄 ‧ 錫呂‧瑪塔吉‧涅瑪拉‧德維</title>
<style>
  :root{
    --paper:#f6f3ee;
    --paper-deep:#efeae1;
    --ink:#4a4238;
    --ink-soft:#7a7268;
    --gold:#b8a06a;
    --line:#ddd5c6;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    background:var(--paper);
    color:var(--ink);
  }

  body{
    font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
    line-height:2;
    -webkit-font-smoothing:antialiased;
  }

  .veil{
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,255,255,0.55), transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 100%, rgba(184,160,106,0.08), transparent 60%);
    z-index:0;
  }

  .page{
    position:relative;
    z-index:1;
    max-width:680px;
    margin:0 auto;
    padding:9vh 8vw 14vh;
  }

  .eyebrow{
    text-align:center;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.72rem;
    letter-spacing:0.32em;
    color:var(--ink-soft);
    text-transform:uppercase;
    margin-bottom:1.1rem;
  }

  .eyebrow .zh-name{
    display:block;
    font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
    text-transform:none;
    letter-spacing:0.28em;
    font-size:0.8rem;
    color:var(--gold);
  }

  h1{
    text-align:center;
    font-weight:500;
    font-size:clamp(1.6rem, 4vw, 2.15rem);
    letter-spacing:0.06em;
    margin:0 0 0.5rem;
    color:var(--ink);
  }

  h1 .sub{
    display:block;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.95rem;
    font-weight:300;
    letter-spacing:0.18em;
    color:var(--ink-soft);
    margin-top:0.9rem;
  }

  .diamond{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:1rem;
    margin:3.2rem 0;
    color:var(--gold);
    opacity:0.7;
  }
  .diamond::before, .diamond::after{
    content:"";
    height:1px;
    width:64px;
    background:var(--line);
  }

  /* ===== spotlight: random quote on load ===== */
  .spotlight{
    margin:0 0 3.2rem;
    padding:2.4rem 2rem;
    background:var(--paper-deep);
    border-left:2px solid var(--gold);
    opacity:0;
    transform:translateY(6px);
    transition:opacity 0.6s ease, transform 0.6s ease;
  }
  .spotlight.show{
    opacity:1;
    transform:translateY(0);
  }
  .spotlight-label{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.68rem;
    letter-spacing:0.12em;
    color:var(--gold);
    margin-bottom:0.9rem;
    opacity:0.85;
  }
  .spotlight-zh{
    font-size:1.05rem;
    line-height:1.95;
    color:var(--ink);
    margin:0 0 1rem;
  }
  .spotlight-link{
    display:inline-block;
    font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
    font-size:0.85rem;
    letter-spacing:0.06em;
    color:var(--ink);
    text-decoration:none;
    border-bottom:1px solid var(--gold);
    padding-bottom:2px;
  }

  /* ===== entry list ===== */
  .entries{
    display:flex;
    flex-direction:column;
    gap:0.7rem;
  }

  .entry{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:1rem;
    text-decoration:none;
    color:inherit;
    padding:0.85rem 1.5rem;
    background:var(--paper-deep);
    border:1px solid var(--line);
    border-left:2px solid var(--gold);
    transition:transform 0.25s ease, box-shadow 0.25s ease;
  }
  .entry:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 24px rgba(58,53,46,0.06);
  }

  .entry-title{
    font-size:1.05rem;
    font-weight:500;
    letter-spacing:0.04em;
    color:var(--ink);
    min-width:0;
  }

  /* ===== search bar ===== */
  .search-wrap{
    display:flex;
    justify-content:center;
    margin:0 0 1.2rem;
  }
  .search-box{
    position:relative;
    width:100%;
    max-width:420px;
  }
  .search-input{
    width:100%;
    font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
    font-size:0.95rem;
    letter-spacing:0.03em;
    color:var(--ink);
    background:transparent;
    border:none;
    border-bottom:1px solid var(--line);
    padding:0.6rem 1.8rem 0.6rem 0.2rem;
    outline:none;
    transition:border-color 0.25s ease;
  }
  .search-input::placeholder{
    color:var(--ink-soft);
    opacity:0.6;
  }
  .search-input:focus{
    border-color:var(--gold);
  }
  .search-clear{
    position:absolute;
    right:0.2rem;
    top:50%;
    transform:translateY(-50%);
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.85rem;
    color:var(--ink-soft);
    cursor:pointer;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.2s ease;
  }
  .search-clear.show{
    opacity:0.7;
    pointer-events:auto;
  }
  .search-clear:hover{
    color:var(--ink);
  }

  .search-status{
    text-align:center;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.7rem;
    letter-spacing:0.1em;
    color:var(--ink-soft);
    margin:0 0 2.2rem;
    min-height:1.2em;
  }

  .no-results{
    display:none;
    text-align:center;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.78rem;
    letter-spacing:0.1em;
    color:var(--ink-soft);
    padding:2.6rem 0;
  }
  .no-results.show{
    display:block;
  }

  .entry.is-hidden,
  .entry-placeholder.is-hidden{
    display:none;
  }

  .entry-arrow{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.9rem;
    color:var(--gold);
    opacity:0.8;
    flex-shrink:0;
  }

  /* ===== placeholder for future entries ===== */
  .entry-placeholder{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:1.7rem 1.8rem;
    border:1px dashed var(--line);
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.72rem;
    letter-spacing:0.1em;
    color:var(--ink-soft);
    opacity:0.55;
  }

  .count{
    text-align:center;
    margin-top:3.2rem;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.7rem;
    letter-spacing:0.14em;
    color:var(--ink-soft);
    opacity:0.7;
  }

  /* ===== pagination ===== */
  .pagination{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    gap:0.4rem;
    margin:2.2rem 0 0;
  }
  .page-btn{
    min-width:2rem;
    height:2rem;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.75rem;
    letter-spacing:0.04em;
    color:var(--ink-soft);
    background:transparent;
    border:1px solid var(--line);
    border-radius:999px;
    padding:0 0.5rem;
    cursor:pointer;
    transition:background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  }
  .page-btn:hover{
    border-color:var(--gold);
    color:var(--ink);
  }
  .page-btn.active{
    background:var(--gold);
    color:var(--paper);
    border-color:var(--gold);
  }
  .page-btn.nav{
    font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
  }
  .page-btn:disabled{
    opacity:0.3;
    cursor:default;
  }
  .page-btn:disabled:hover{
    border-color:var(--line);
    color:var(--ink-soft);
  }
  .page-ellipsis{
    color:var(--ink-soft);
    opacity:0.5;
    font-size:0.75rem;
    padding:0 0.2rem;
  }

  @media (max-width:480px){
    .page{ padding:8vh 7vw 10vh; }
    .entry{ padding:0.75rem 1.2rem; }
  }
</style>
</head>
<body>
<div class="veil"></div>
<div class="page">

  <div class="eyebrow">
    <span class="zh-name">錫呂‧瑪塔吉‧涅瑪拉‧德維　靈性語錄</span>
  </div>
  <h1>語錄選集</h1>

  <div class="spotlight" id="spotlight">
    <div class="spotlight-label">專屬於你的今日靈性滋養</div>
    <p class="spotlight-zh" id="spotlight-zh"></p>
    <a class="spotlight-link" id="spotlight-link" href="#">閱讀全文 →</a>
  </div>

  <!-- ===========================================================
       SEARCH BAR
       輸入文字即可即時篩選下方的語錄清單，比對標題（中/英）
       與標籤。不需要另外維護，資料一樣來自 quotes-data.js。
       =========================================================== -->
  <div class="search-wrap">
    <div class="search-box">
      <input type="text" class="search-input" id="search-input" placeholder="搜尋語錄，例如：昆達里尼、覺醒…" autocomplete="off">
      <span class="search-clear" id="search-clear">✕</span>
    </div>
  </div>
  <div class="search-status" id="search-status"></div>

  <!-- ===========================================================
       ENTRY LIST
       這裡的卡片會在載入時由 quotes-data.js 自動產生，
       新增／修改語錄時，只需要編輯 quotes-data.js 裡的 QUOTES_DATA
       陣列即可，不用再手動改這裡的 HTML。每頁顯示筆數由下方
       PAGE_SIZE 控制，篇數變多也不用再改這裡。
       =========================================================== -->
  <div class="entries" id="entries"></div>

  <div class="no-results" id="no-results">‧ 沒有符合的語錄，換個關鍵字試試 ‧</div>

  <div class="pagination" id="pagination"></div>

  <div class="entry-placeholder" id="entry-placeholder">‧ 更多語錄，陸續增加中 ‧</div>

  <div class="count" id="count-label"></div>


</div>

<script src="quotes-data.js"></script>
<script>
  /* ===========================================================
     以下內容全部由 quotes-data.js 的 QUOTES_DATA 陣列產生。
     日後新增／修改語錄，只需要編輯 quotes-data.js，
     這裡的清單、搜尋、翻頁、隨機語錄都會自動同步，不用再改這個檔案。
     =========================================================== */

  const PAGE_SIZE = 8; // 每頁顯示幾篇，想調整只改這個數字

  const entriesEl = document.getElementById('entries');
  const searchInput = document.getElementById('search-input');
  const searchClear = document.getElementById('search-clear');
  const searchStatus = document.getElementById('search-status');
  const placeholder = document.getElementById('entry-placeholder');
  const noResults = document.getElementById('no-results');
  const paginationEl = document.getElementById('pagination');
  const countLabel = document.getElementById('count-label');
  const originalCount = QUOTES_DATA.length;

  let currentPage = 1;

  // ---- 產生 entries 卡片 ----
  // 卡片顯示順序：quotes-data.js 陣列「最後新增」的項目會排在最前面。
  // 也就是說，以後每天新增一篇語錄，只要照慣例把新物件貼在
  // QUOTES_DATA 陣列的最後面，網頁就會自動把它顯示在第一筆，
  // 不用手動搬動順序，也不用改這裡的程式。
  const entries = QUOTES_DATA.slice().reverse().map(q => {
    const a = document.createElement('a');
    a.className = 'entry';
    a.href = q.file;
    // 搜尋用的比對文字：中文標題、英文標題、標籤
    a.dataset.search = [q.zhTitle, q.enTitle, q.tags.join(' ')].join(' ').toLowerCase();

    const title = document.createElement('div');
    title.className = 'entry-title';
    title.append(q.zhTitle);

    const arrow = document.createElement('span');
    arrow.className = 'entry-arrow';
    arrow.textContent = '\u2192';

    a.appendChild(title);
    a.appendChild(arrow);
    entriesEl.appendChild(a);
    return a;
  });

  // ---- 產生翻頁按鈕的頁碼清單（多頁時中間用...省略）----
  function buildPageNumbers(current, total){
    const pages = [];
    const add = (n) => pages.push(n);
    const addDots = () => pages.push('...');

    if (total <= 7){
      for (let i = 1; i <= total; i++) add(i);
      return pages;
    }

    add(1);
    if (current > 3) addDots();

    const start = Math.max(2, current - 1);
    const end = Math.min(total - 1, current + 1);
    for (let i = start; i <= end; i++) add(i);

    if (current < total - 2) addDots();
    add(total);
    return pages;
  }

  function renderPagination(totalPages){
    paginationEl.innerHTML = '';
    if (totalPages <= 1) return;

    const prev = document.createElement('button');
    prev.className = 'page-btn nav';
    prev.textContent = '‹';
    prev.disabled = currentPage === 1;
    prev.addEventListener('click', () => goToPage(currentPage - 1));
    paginationEl.appendChild(prev);

    buildPageNumbers(currentPage, totalPages).forEach(p => {
      if (p === '...'){
        const dots = document.createElement('span');
        dots.className = 'page-ellipsis';
        dots.textContent = '…';
        paginationEl.appendChild(dots);
        return;
      }
      const btn = document.createElement('button');
      btn.className = 'page-btn' + (p === currentPage ? ' active' : '');
      btn.textContent = p;
      btn.addEventListener('click', () => goToPage(p));
      paginationEl.appendChild(btn);
    });

    const next = document.createElement('button');
    next.className = 'page-btn nav';
    next.textContent = '›';
    next.disabled = currentPage === totalPages;
    next.addEventListener('click', () => goToPage(currentPage + 1));
    paginationEl.appendChild(next);
  }

  function goToPage(p){
    currentPage = p;
    render();
    entriesEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ---- 搜尋 + 翻頁 合併渲染 ----
  function render(){
    const keyword = searchInput.value.trim().toLowerCase();
    const filtered = entries.filter(entry => !keyword || entry.dataset.search.includes(keyword));
    const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));

    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;

    const startIdx = (currentPage - 1) * PAGE_SIZE;
    const pageItems = new Set(filtered.slice(startIdx, startIdx + PAGE_SIZE));

    entries.forEach(entry => {
      entry.classList.toggle('is-hidden', !pageItems.has(entry));
    });

    searchClear.classList.toggle('show', !!keyword);

    if (placeholder){
      placeholder.classList.toggle('is-hidden', !!keyword || currentPage !== totalPages);
    }

    if (noResults){
      noResults.classList.toggle('show', !!keyword && filtered.length === 0);
    }

    if (keyword){
      searchStatus.textContent = `「${searchInput.value.trim()}」‧ 共 ${filtered.length} 篇`;
    } else {
      searchStatus.textContent = '';
    }

    if (countLabel){
      countLabel.textContent = keyword
        ? `顯示 ${filtered.length} / ${originalCount} 篇`
        : `共 ${originalCount} 篇 ‧ 第 ${currentPage} / ${totalPages} 頁`;
    }

    renderPagination(totalPages);
  }

  searchInput.addEventListener('input', () => {
    currentPage = 1;
    render();
  });
  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    currentPage = 1;
    render();
    searchInput.focus();
  });

  render();

  // ---- 隨機語錄 spotlight ----
  const pick = QUOTES_DATA[Math.floor(Math.random() * QUOTES_DATA.length)];
  document.getElementById('spotlight-zh').textContent = pick.spotlightZh;
  document.getElementById('spotlight-link').href = pick.file;

  requestAnimationFrame(() => {
    document.getElementById('spotlight').classList.add('show');
  });
</script>


</body>
</html>
