<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>靈性語錄 ‧ 錫呂‧瑪塔吉‧涅瑪拉‧德維</title>
<style>
  :root{
    --paper:#f6f3ee;
    --paper-deep:#efeae1;
    --ink:#4a4238;
    --ink-soft:#7a7268;
    --gold:#b8a06a;
    --line:#ddd5c6;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    background:var(--paper);
    color:var(--ink);
  }

  body{
    font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
    line-height:2;
    -webkit-font-smoothing:antialiased;
  }

  .veil{
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,255,255,0.55), transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 100%, rgba(184,160,106,0.08), transparent 60%);
    z-index:0;
  }

  .page{
    position:relative;
    z-index:1;
    max-width:680px;
    margin:0 auto;
    padding:9vh 8vw 14vh;
  }

  .eyebrow{
    text-align:center;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.72rem;
    letter-spacing:0.32em;
    color:var(--ink-soft);
    text-transform:uppercase;
    margin-bottom:1.1rem;
  }

  .eyebrow .zh-name{
    display:block;
    font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
    text-transform:none;
    letter-spacing:0.28em;
    font-size:0.8rem;
    color:var(--gold);
  }

  h1{
    text-align:center;
    font-weight:500;
    font-size:clamp(1.6rem, 4vw, 2.15rem);
    letter-spacing:0.06em;
    margin:0 0 0.5rem;
    color:var(--ink);
  }

  h1 .sub{
    display:block;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.95rem;
    font-weight:300;
    letter-spacing:0.18em;
    color:var(--ink-soft);
    margin-top:0.9rem;
  }

  .diamond{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:1rem;
    margin:3.2rem 0;
    color:var(--gold);
    opacity:0.7;
  }
  .diamond::before, .diamond::after{
    content:"";
    height:1px;
    width:64px;
    background:var(--line);
  }

  /* ===== spotlight: random quote on load ===== */
  .spotlight{
    margin:0 0 3.2rem;
    padding:2.4rem 2rem;
    background:var(--paper-deep);
    border-left:2px solid var(--gold);
    opacity:0;
    transform:translateY(6px);
    transition:opacity 0.6s ease, transform 0.6s ease;
  }
  .spotlight.show{
    opacity:1;
    transform:translateY(0);
  }
  .spotlight-label{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.68rem;
    letter-spacing:0.12em;
    color:var(--gold);
    margin-bottom:0.9rem;
    opacity:0.85;
  }
  .spotlight-zh{
    font-size:1.05rem;
    line-height:1.95;
    color:var(--ink);
    margin:0 0 1rem;
  }
  .spotlight-en{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.85rem;
    font-style:italic;
    font-weight:300;
    color:var(--ink-soft);
    line-height:1.8;
    margin:0 0 1.3rem;
  }
  .spotlight-link{
    display:inline-block;
    font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
    font-size:0.85rem;
    letter-spacing:0.06em;
    color:var(--ink);
    text-decoration:none;
    border-bottom:1px solid var(--gold);
    padding-bottom:2px;
  }

  /* ===== entry list ===== */
  .entries{
    display:flex;
    flex-direction:column;
    gap:1.2rem;
  }

  .entry{
    display:block;
    text-decoration:none;
    color:inherit;
    padding:1.7rem 1.8rem;
    background:var(--paper-deep);
    border:1px solid var(--line);
    border-left:2px solid var(--gold);
    transition:transform 0.25s ease, box-shadow 0.25s ease;
  }
  .entry:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 24px rgba(58,53,46,0.06);
  }

  .entry-title{
    font-size:1.15rem;
    font-weight:500;
    letter-spacing:0.04em;
    color:var(--ink);
  }
  .entry-title .en{
    display:block;
    margin-top:0.3rem;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.8rem;
    font-weight:300;
    font-style:italic;
    letter-spacing:0.05em;
    color:var(--ink-soft);
  }

  .entry-meta{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:1rem;
  }

  .entry-tags{
    display:flex;
    flex-wrap:wrap;
    gap:0.5rem;
  }
  .entry-tag{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.62rem;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:999px;
    padding:0.25rem 0.7rem;
    cursor:pointer;
    transition:background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  }
  .entry-tag:hover{
    border-color:var(--gold);
    color:var(--ink);
  }
  .entry-tag.active-tag{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }

  /* ===== tag filter bar ===== */
  .filter-bar{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:0.55rem;
    margin:0 0 2.6rem;
  }
  .filter-chip{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.68rem;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    background:var(--paper-deep);
    border:1px solid var(--line);
    border-radius:999px;
    padding:0.4rem 0.95rem;
    cursor:pointer;
    transition:background 0.2s ease, color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
  }
  .filter-chip:hover{
    border-color:var(--gold);
    transform:translateY(-1px);
  }
  .filter-chip.active{
    background:var(--gold);
    color:var(--paper);
    border-color:var(--gold);
  }

  .filter-status{
    text-align:center;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.7rem;
    letter-spacing:0.1em;
    color:var(--ink-soft);
    margin:0 0 1.8rem;
    min-height:1.2em;
  }
  .filter-status .clear{
    color:var(--gold);
    text-decoration:underline;
    cursor:pointer;
    margin-left:0.6rem;
  }

  .entry.is-hidden,
  .entry-placeholder.is-hidden{
    display:none;
  }



  .entry-arrow{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.9rem;
    color:var(--gold);
    opacity:0.8;
    flex-shrink:0;
    margin-left:1rem;
  }

  /* ===== placeholder for future entries ===== */
  .entry-placeholder{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:1.7rem 1.8rem;
    border:1px dashed var(--line);
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.72rem;
    letter-spacing:0.1em;
    color:var(--ink-soft);
    opacity:0.55;
  }

  .count{
    text-align:center;
    margin-top:3.2rem;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.7rem;
    letter-spacing:0.14em;
    color:var(--ink-soft);
    opacity:0.7;
  }

  @media (max-width:480px){
    .page{ padding:8vh 7vw 10vh; }
    .entry{ padding:1.4rem 1.4rem; }
  }
</style>
</head>
<body>
<div class="veil"></div>
<div class="page">

  <div class="eyebrow">
    <span class="zh-name">錫呂‧瑪塔吉‧涅瑪拉‧德維　靈性語錄</span>
  </div>
  <h1>語錄選集
    <span class="sub">Selected Quotations</span>
  </h1>

  <div class="spotlight" id="spotlight">
    <div class="spotlight-label">專屬於你的今日靈性滋養</div>
    <p class="spotlight-zh" id="spotlight-zh"></p>
    <p class="spotlight-en" id="spotlight-en"></p>
    <a class="spotlight-link" id="spotlight-link" href="#">閱讀全文 →</a>
  </div>

  <!-- ===========================================================
       TAG FILTER BAR
       標籤會自動從下方 entries 的 data-tags 產生，點擊即可篩選；
       每篇 entry 卡片內的小標籤也可直接點擊，作用相同。
       =========================================================== -->
  <div class="filter-bar" id="filter-bar"></div>
  <div class="filter-status" id="filter-status"></div>

  <!-- ===========================================================
       ENTRY LIST
       這裡的卡片會在載入時由 quotes-data.js 自動產生，
       新增／修改語錄時，只需要編輯 quotes-data.js 裡的 QUOTES_DATA
       陣列即可，不用再手動改這裡的 HTML。
       =========================================================== -->
  <div class="entries" id="entries"></div>

  <div class="entry-placeholder" id="entry-placeholder">‧ 更多語錄，陸續增加中 ‧</div>

  <div class="count" id="count-label"></div>


</div>

<script src="quotes-data.js"></script>
<script>
  /* ===========================================================
     以下內容全部由 quotes-data.js 的 QUOTES_DATA 陣列產生。
     日後新增／修改語錄，只需要編輯 quotes-data.js，
     這裡的清單、標籤篩選、隨機語錄都會自動同步，不用再改這個檔案。
     =========================================================== */

  const entriesEl = document.getElementById('entries');
  const filterBar = document.getElementById('filter-bar');
  const filterStatus = document.getElementById('filter-status');
  const placeholder = document.getElementById('entry-placeholder');
  const countLabel = document.getElementById('count-label');
  const originalCount = QUOTES_DATA.length;

  // ---- 產生 entries 卡片 ----
  const entries = QUOTES_DATA.map(q => {
    const a = document.createElement('a');
    a.className = 'entry';
    a.href = q.file;
    a.dataset.tags = q.tags.join('\u3001');

    const title = document.createElement('div');
    title.className = 'entry-title';
    title.append(q.zhTitle);
    const en = document.createElement('span');
    en.className = 'en';
    en.textContent = q.enTitle;
    title.appendChild(en);

    const meta = document.createElement('div');
    meta.className = 'entry-meta';

    const tagsWrap = document.createElement('div');
    tagsWrap.className = 'entry-tags';
    q.tags.forEach(tag => {
      const tagEl = document.createElement('span');
      tagEl.className = 'entry-tag';
      tagEl.textContent = tag;
      tagEl.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        setActiveTag(tag === activeTag ? null : tag);
        filterBar.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      tagsWrap.appendChild(tagEl);
    });

    const arrow = document.createElement('span');
    arrow.className = 'entry-arrow';
    arrow.textContent = '\u2192';

    meta.appendChild(tagsWrap);
    meta.appendChild(arrow);
    a.appendChild(title);
    a.appendChild(meta);
    entriesEl.appendChild(a);
    return a;
  });

  // ---- 標籤篩選列 ----
  const tagOrder = [];
  const tagSeen = new Set();
  QUOTES_DATA.forEach(q => {
    q.tags.forEach(tag => {
      if (!tagSeen.has(tag)) {
        tagSeen.add(tag);
        tagOrder.push(tag);
      }
    });
  });

  let activeTag = null;

  function renderFilterBar(){
    filterBar.innerHTML = '';
    tagOrder.forEach(tag => {
      const chip = document.createElement('span');
      chip.className = 'filter-chip' + (tag === activeTag ? ' active' : '');
      chip.textContent = tag;
      chip.addEventListener('click', () => setActiveTag(tag === activeTag ? null : tag));
      filterBar.appendChild(chip);
    });
  }

  function applyFilter(){
    let shown = 0;
    entries.forEach(entry => {
      const tags = entry.dataset.tags.split('\u3001');
      const match = !activeTag || tags.includes(activeTag);
      entry.classList.toggle('is-hidden', !match);
      entry.querySelectorAll('.entry-tag').forEach(t => {
        t.classList.toggle('active-tag', t.textContent.trim() === activeTag);
      });
      if (match) shown++;
    });

    if (placeholder){
      placeholder.classList.toggle('is-hidden', !!activeTag);
    }

    if (activeTag){
      filterStatus.innerHTML =
        `已篩選「${activeTag}」‧ 共 ${shown} 篇 <span class="clear" id="clear-filter">清除篩選</span>`;
      const clearBtn = document.getElementById('clear-filter');
      if (clearBtn) clearBtn.addEventListener('click', () => setActiveTag(null));
    } else {
      filterStatus.textContent = '';
    }

    if (countLabel){
      countLabel.textContent = activeTag
        ? `顯示 ${shown} / ${originalCount} 篇`
        : `共 ${originalCount} 篇`;
    }
  }

  function setActiveTag(tag){
    activeTag = tag;
    renderFilterBar();
    applyFilter();
  }

  renderFilterBar();
  applyFilter();

  // ---- 隨機語錄 spotlight ----
  const pick = QUOTES_DATA[Math.floor(Math.random() * QUOTES_DATA.length)];
  document.getElementById('spotlight-zh').textContent = pick.spotlightZh;
  document.getElementById('spotlight-en').textContent = pick.spotlightEn;
  document.getElementById('spotlight-link').href = pick.file;

  requestAnimationFrame(() => {
    document.getElementById('spotlight').classList.add('show');
  });
</script>


</body>
</html>
