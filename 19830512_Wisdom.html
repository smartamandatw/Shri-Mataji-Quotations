<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧 ‧ Wisdom</title>
<style>
  :root{
    --paper:#f6f3ee;
    --paper-deep:#efeae1;
    --ink:#4a4238;
    --ink-soft:#7a7268;
    --gold:#b8a06a;
    --line:#ddd5c6;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    background:var(--paper);
    color:var(--ink);
  }

  body{
    font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
    line-height:2;
    -webkit-font-smoothing:antialiased;
  }

  .veil{
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,255,255,0.55), transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 100%, rgba(184,160,106,0.08), transparent 60%);
    z-index:0;
  }

  .page{
    position:relative;
    z-index:1;
    max-width:680px;
    margin:0 auto;
    padding:9vh 8vw 14vh;
  }

  .eyebrow{
    text-align:center;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.72rem;
    letter-spacing:0.32em;
    color:var(--ink-soft);
    text-transform:uppercase;
    margin-bottom:1.1rem;
  }

  .eyebrow .zh-name{
    display:block;
    font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
    text-transform:none;
    letter-spacing:0.28em;
    font-size:0.8rem;
    color:var(--gold);
  }

  h1{
    text-align:center;
    font-weight:500;
    font-size:clamp(1.6rem, 4vw, 2.15rem);
    letter-spacing:0.06em;
    margin:0 0 0.5rem;
    color:var(--ink);
  }

  h1 .sub{
    display:block;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.95rem;
    font-weight:300;
    letter-spacing:0.18em;
    color:var(--ink-soft);
    margin-top:0.9rem;
  }

  .tags{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:0.6rem;
    margin:1.6rem 0 0;
  }
  .tag{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.7rem;
    letter-spacing:0.1em;
    color:var(--ink-soft);
    background:var(--paper-deep);
    border:1px solid var(--line);
    border-radius:999px;
    padding:0.35rem 0.9rem;
  }

  .diamond{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:1rem;
    margin:3.2rem 0;
    color:var(--gold);
    opacity:0.7;
  }
  .diamond::before, .diamond::after{
    content:"";
    height:1px;
    width:64px;
    background:var(--line);
  }

  /* language toggle */
  .toggle-row{
    display:flex;
    justify-content:center;
    gap:0.6rem;
    margin-bottom:3rem;
    font-family:"Helvetica Neue",Arial,sans-serif;
  }
  .toggle-btn{
    border:1px solid var(--line);
    background:transparent;
    color:var(--ink-soft);
    font-size:0.72rem;
    letter-spacing:0.16em;
    padding:0.5rem 1.1rem;
    border-radius:999px;
    cursor:pointer;
    transition:all 0.25s ease;
  }
  .toggle-btn.active{
    background:var(--ink);
    color:var(--paper);
    border-color:var(--ink);
  }

  .pull .zh-p{
    font-size:1.15rem;
    line-height:2.05;
    color:var(--ink);
    margin:0 0 1.1rem;
    text-align:center;
  }
  .pull{
    margin:3.4rem 0;
    padding:2.6rem 2rem;
    background:var(--paper-deep);
    border-left:2px solid var(--gold);
  }
  .pull .en{
    padding-top:1rem;
    border-top:1px dashed var(--line);
    text-align:center;
  }

  .en{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.92rem;
    font-style:italic;
    font-weight:300;
    color:var(--ink-soft);
    line-height:1.85;
    letter-spacing:0.005em;
    margin:0;
  }

  .source{
    margin-top:5rem;
    text-align:center;
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:0.78rem;
    letter-spacing:0.14em;
    color:var(--ink-soft);
  }
  .source .loc{
    display:block;
    margin-top:0.4rem;
  }

  body.mode-zh .en{ display:none; }

  body.mode-en .pull .zh-p{ display:none; }

  @media (max-width:480px){
    .page{ padding:8vh 7vw 10vh; }
    .pull{ padding:2rem 1.4rem; }
  }
</style>
</head>
<body class="mode-zh" data-quote-id="19830512_Wisdom">
<div class="veil"></div>
<div class="page">

  <div class="eyebrow">
    <span class="zh-name">錫呂‧瑪塔吉‧涅瑪拉‧德維　靈性語錄</span>
  </div>
  <h1>智慧
    <span class="sub">Wisdom</span>
  </h1>

  <div class="tags"></div>

  <div class="diamond">❖</div>

  <div class="toggle-row">
    <button class="toggle-btn" data-mode="zh">中文</button>
    <button class="toggle-btn" data-mode="both">中英對照</button>
    <button class="toggle-btn" data-mode="en">英文</button>
  </div>

  <div class="pull">
    <p class="zh-p">要明白，智慧高於才智，明辨高於爭辯。</p>
    <p class="en">Understand that wisdom is higher than intellect and discretion is higher than debating.</p>
  </div>

  <div class="source">
    1983年5月12日‧英國 UK
    <span class="loc">霎哈嘉瑜伽在全世界各國推廣皆為公益免費</span>
  </div>

</div>

<script src="quotes-data.js"></script>
<script>
  (function(){
    var pageId = document.body.getAttribute('data-quote-id');
    var data = (typeof QUOTES_DATA !== 'undefined' ? QUOTES_DATA : []).find(function(q){ return q.id === pageId; });
    if (data && data.tags) {
      var tagsEl = document.querySelector('.tags');
      if (tagsEl) {
        tagsEl.innerHTML = data.tags.map(function(t){
          return '<span class="tag">' + t + '</span>';
        }).join('');
      }
    }
  })();
</script>
<script>
  const buttons = document.querySelectorAll('.toggle-btn');
  const body = document.body;

  function setMode(mode){
    body.className = 'mode-' + mode;
    buttons.forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  }

  buttons.forEach(btn => {
    btn.addEventListener('click', () => setMode(btn.dataset.mode));
  });

  setMode('zh');
</script>

</body>
</html>
